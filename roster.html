<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MKR | Roster</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
<nav class="nav">
<a href="index.html" class="brand">
<img src="img/logo.png" alt="MKR Logo">
<div class="brand-text">
<span class="brand-title">MKR</span>
<span class="brand-subtitle">Miktlan Riders</span>
</div>
</a>
</nav>
</header>

<section class="content">
<h1>ROSTER OFICIAL</h1>

<div class="roster-container">

<div class="player-card">
<img src="img/players/top.png" alt="Top">
<div class="player-info">
<span class="role">TOP</span>
<h3>Crimson</h3>
<p>Tanques · Bruisers</p>
</div>
</div>

<div class="player-card">
<img src="img/players/jg.png" alt="Jungla">
<div class="player-info">
<span class="role">JUNGLA</span>
<h3>Uvi</h3>
<p>Control de objetivos</p>
</div>
</div>

<div class="player-card">
<img src="img/players/mid.png" alt="Mid">
<div class="player-info">
<span class="role">MID</span>
<h3>SAMID</h3>
<p>Magos · Asesinos</p>
</div>
</div>

<div class="player-card">
<img src="img/players/adc.png" alt="ADC">
<div class="player-info">
<span class="role">ADC</span>
<h3>Kόσμος</h3>
<p>Carry principal</p>
</div>
</div>

<div class="player-card">
<img src="img/players/sup.png" alt="Support">
<div class="player-info">
<span class="role">SUPPORT</span>
<h3>Skevenger</h3>
<p>Engage · Peel</p>
</div>
</div>

</div>
</section>

<script>
const cards = document.querySelectorAll('.player-card');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});

cards.forEach(card => observer.observe(card));
</script>

</body>
</html>
